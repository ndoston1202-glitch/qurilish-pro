<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Seller — Savdo tizimi</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginSahifa" class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <i class="fas fa-award"></i>
      <h1>Best Seller</h1>
      <p>Savdo boshqaruv tizimi</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" id="loginUsername" placeholder="Username kiriting" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Parol</label>
        <div class="parol-wrapper">
          <input type="password" id="loginParol" placeholder="Parol kiriting" required>
          <i class="fas fa-eye" id="kozsatBtn" onclick="parolKorsatYashir()"></i>
        </div>
      </div>
      <div id="loginXato" class="xato-xabar" style="display:none"></div>
      <button type="submit" class="btn-kirish">
        <i class="fas fa-sign-in-alt"></i> Kirish
      </button>
    </form>
  </div>
</div>

<!-- ASOSIY ILOVA -->
<div id="asosiyIlova" style="display:none">
  <!-- SIDEBAR -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-award"></i>
      <span class="sidebar-title">Best Seller</span>
      <button class="sidebar-close" onclick="sidebarToggle()"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
      <div>
        <div id="sidebarUserIsm" class="user-ism"></div>
        <div id="sidebarUserRol" class="user-rol"></div>
      </div>
    </div>
    <ul class="sidebar-menu">
      <li onclick="sahifaOch('dashboard')" id="menu-dashboard" class="active">
        <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
      </li>
      <li onclick="sahifaOch('hisobot')" id="menu-hisobot">
        <i class="fas fa-chart-bar"></i><span>Hisobotlar</span>
      </li>

      <!-- BO'LUVCHI CHIZIQ -->
      <li style="border-top:1px solid rgba(255,255,255,0.08);margin:6px 16px;padding:0;cursor:default;height:0"></li>

      <li onclick="sahifaOch('kassa')" id="menu-kassa">
        <i class="fas fa-cash-register"></i><span>Sotuv</span>
      </li>
      <li onclick="sahifaOch('kassa_hisobi')" id="menu-kassa_hisobi">
        <i class="fas fa-wallet"></i><span>Kassa hisobi</span>
      </li>
      <li onclick="sahifaOch('qarzlar')" id="menu-qarzlar">
        <i class="fas fa-clock" style="color:#ef4444"></i>
        <span>Qarzlar <span id="qarzBadge" style="display:none;background:#ef4444;color:white;
          border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;font-weight:700"></span></span>
      </li>

      <!-- BO'LUVCHI CHIZIQ -->
      <li style="border-top:1px solid rgba(255,255,255,0.08);margin:6px 16px;padding:0;cursor:default;height:0"></li>

      <li onclick="sahifaOch('mahsulotlar')" id="menu-mahsulotlar">
        <i class="fas fa-warehouse"></i><span>Ombor</span>
      </li>
      <li onclick="sahifaOch('etiketka')" id="menu-etiketka">
        <i class="fas fa-tag" style="color:#a78bfa"></i><span>Etiketka</span>
      </li>
      <li onclick="sahifaOch('brendlar')" id="menu-brendlar">
        <i class="fas fa-copyright"></i><span>Brendlar</span>
      </li>

      <!-- BO'LUVCHI CHIZIQ -->
      <li style="border-top:1px solid rgba(255,255,255,0.08);margin:6px 16px;padding:0;cursor:default;height:0"></li>

      <li onclick="sahifaOch('mijozlar')" id="menu-mijozlar">
        <i class="fas fa-user-friends"></i><span>Mijozlar</span>
      </li>
      <li onclick="sahifaOch('jurnal')" id="menu-jurnal">
        <i class="fas fa-book"></i><span>Jurnal</span>
      </li>
      <li onclick="sahifaOch('ai')" id="menu-ai">
        <i class="fas fa-robot"></i><span>AI Yordamchi</span>
      </li>

      <!-- BO'LUVCHI CHIZIQ -->
      <li style="border-top:1px solid rgba(255,255,255,0.08);margin:6px 16px;padding:0;cursor:default;height:0"></li>

      <li onclick="sahifaOch('xodimlar')" id="menu-xodimlar" class="admin-only" style="display:none">
        <i class="fas fa-id-badge"></i><span>Xodimlar</span>
      </li>
      <li onclick="sahifaOch('integratsiya')" id="menu-integratsiya" class="admin-only" style="display:none">
        <i class="fas fa-plug" style="color:#22d3ee"></i><span>Integratsiya</span>
      </li>
    </ul>
    <div class="sidebar-bottom">
      <!-- SOZLAMALAR chap pastda -->
      <li onclick="sahifaOch('sozlamalar')" id="menu-sozlamalar"
        style="list-style:none;display:flex;align-items:center;gap:12px;padding:10px 16px;
        color:#94a3b8;cursor:pointer;font-size:15px;border-radius:8px;margin-bottom:8px;transition:all 0.2s"
        onmouseover="this.style.background='rgba(255,255,255,0.05)'"
        onmouseout="this.style.background='transparent'">
        <i class="fas fa-cog" style="width:20px;text-align:center"></i>
        <span>Sozlamalar</span>
      </li>
      <button onclick="chiqish()" class="btn-chiqish">
        <i class="fas fa-sign-out-alt"></i><span>Chiqish</span>
      </button>
    </div>
  </nav>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay" onclick="sidebarToggle()"></div>

  <!-- ASOSIY KONTENT -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" onclick="sidebarToggle()"><i class="fas fa-bars"></i></button>
      <h2 id="sahifaNomi">Dashboard</h2>
      <div class="topbar-right">
        <span id="topbarSana" class="sana"></span>
        <span id="topbarUser" class="topbar-user"></span>
      </div>
    </header>

    <main id="asosiyKontent" class="main-content">
      <!-- Sahifalar JS orqali yuklanadi -->
    </main>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalSarlavha"></h3>
      <button onclick="modalYop()" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div id="modalKontent" class="modal-kontent"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast" style="display:none"></div>

<script src="js/api.js?v=35"></script>
<script src="js/sozlamalar.js?v=35"></script>
<script src="js/dashboard.js?v=35"></script>
<script src="js/mahsulotlar.js?v=35"></script>
<script src="js/kassa.js?v=35"></script>
<script src="js/kassa_hisobi.js?v=35"></script>
<script src="js/ombor.js?v=35"></script>
<script src="js/hisobot.js?v=35"></script>
<script src="js/jurnal.js?v=35"></script>
<script src="js/xodimlar.js?v=35"></script>
<script src="js/mijozlar.js?v=35"></script>
<script src="js/ai.js?v=35"></script>
<script src="js/printer.js?v=35"></script>
<script src="js/qarz.js?v=35"></script>
<script src="js/brendlar.js?v=35"></script>
<script src="js/etiketka.js?v=35"></script>
<script src="js/integratsiya.js?v=35"></script>
<script src="js/app.js?v=35"></script>
</body>
</html>
